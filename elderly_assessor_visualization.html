        }

            color: #2c3e50;
        }

            cursor: pointer;
            stroke-width: 2px;
        }
        .node:hover {
            stroke: #000;
            stroke-width: 3px;
        }
        .node-text {
            font-size: 12px;
            pointer-events: none;
            text-anchor: middle;
            fill: #333;
            font-weight: bold;
        }

            stroke-width: 2px;
        }

            font-size: 10px;
            fill: #7f8c8d;
            text-anchor: middle;
            pointer-events: none;

            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;

        // 图尺寸
        const width = document.getElementById('graph-container').offsetWidth;
        const height = document.getElementById('graph-container').offsetHeight;
        
        // 创建SVG
        const svg = d3.select('#graph-container')
            .append('svg')
            .attr('width', width)
            .attr('height', height);
        
        // 创建缩放容器
        const g = svg.append('g');
        
        // 添加缩放行为
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
        
        svg.call(zoom);
        
        // 创建力模拟
        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(edges).id(d => d.id).distance(100))
            .force('charge', d3.forceManyBody().strength(-300))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(40))
            .on('tick', ticked);
        
        // 创建线（边）
        const link = g.append('g')
            .selectAll('line')
            .data(edges)
            .enter()
            .append('line')
            .attr('class', 'link')
            .attr('stroke-width', 2)
            .attr('stroke', d => d.type === 'requires_skill' ? '#e74c3c' : '#3498db');
        
        // 创建边的标签
        const linkLabels = g.append('g')
            .selectAll('text')
            .data(edges)
            .enter()
            .append('text')
            .attr('class', 'link-label')
            .text(d => d.label)
            .attr('font-size', '10px')
            .attr('fill', '#7f8c8d');
        
        // 创建节点组
        const node = g.append('g')
            .selectAll('circle')
            .data(nodes)
            .enter()
            .append('circle')
            .attr('class', 'node')
            .attr('r', 15)
            .attr('fill', d => d.color)
            .attr('stroke', d => d3.color(d.color).darker())
            .attr('stroke-width', 2)
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended))
            .on('click', handleNodeClick)
            .on('mouseover', handleMouseOver)
            .on('mouseout', handleMouseOut);
        
        // 创建节点标签
        const labels = g.append('g')
            .selectAll('text')
            .data(nodes)
            .enter()
            .append('text')
            .attr('class', 'node-text')
            .text(d => d.label.length > 20 ? d.label.substring(0, 20) + '...' : d.label)
            .attr('font-size', '12px')
            .attr('fill', '#333');
        
        // 更新函数
        function ticked() {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            linkLabels
                .attr('x', d => (d.source.x + d.target.x) / 2)
                .attr('y', d => (d.source.y + d.target.y) / 2);
            
            node
                .attr('cx', d => d.x)
                .attr('cy', d => d.y);
            
            labels
                .attr('x', d => d.x)
                .attr('y', d => d.y + 5);
        }
        
        // 拖动函数
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // 节点点击处理
        function handleNodeClick(event, d) {
            // 显示节点详细信息
            const details = document.getElementById('node-details');
            let html = '<div class="node-info">' +
                '<h3>' + d.label + '</h3>' +
                '<div class="node-property">' +
                '<span class="property-label">类型:</span>' +
                '<span class="property-value">' + d.type + '</span>' +
                '</div>' +
                '<div class="node-property">' +
                '<span class="property-label">ID:</span>' +
                '<span class="property-value">' + d.id + '</span>' +
                '</div>';
            
            // 显示属性
            for (const [key, value] of Object.entries(d.properties)) {
                html += '<div class="node-property">' +
                    '<span class="property-label">' + key + ':</span>' +
                    '<span class="property-value">' + value + '</span>' +
                    '</div>';
            }
            
            // 显示关联关系
            const connectedEdges = edges.filter(e => e.source.id === d.id || e.target.id === d.id);
            if (connectedEdges.length > 0) {
                html += '<div class="node-property">' +
                    '<span class="property-label">关联关系:</span>' +
                    '<ul style="margin: 5px 0 0 0; padding-left: 20px;">';
                connectedEdges.forEach(e => {
                    const otherNode = e.source.id === d.id ? 
                        nodes.find(n => n.id === e.target) : 
                        nodes.find(n => n.id === e.source);
                    const direction = e.source.id === d.id ? '→' : '←';
                    html += '<li>' + direction + ' ' + (otherNode ? otherNode.label : '未知') + ' (' + e.label + ')</li>';
                });
                html += '</ul></div>';
            }
            
            html += '</div>';
            details.innerHTML = html;
            
            // 高亮相关节点和边
            highlightRelatedNodes(d.id);
        }
        
        // 高亮相关节点
        function highlightRelatedNodes(nodeId) {
            // 重置所有高亮
            node.attr('stroke-width', 2)
                .attr('stroke', d => d3.color(d.color).darker());
            link.attr('stroke', d => d.type === 'requires_skill' ? '#e74c3c' : '#3498db')
                .attr('stroke-width', 2);
            
            // 高亮相关边
            link.filter(d => d.source.id === nodeId || d.target.id === nodeId)
                .attr('stroke', '#f39c12')
                .attr('stroke-width', 4);
            
            // 高亮相关节点
            const connectedNodeIds = new Set();
            edges.forEach(e => {
                if (e.source.id === nodeId) connectedNodeIds.add(e.target.id);
                if (e.target.id === nodeId) connectedNodeIds.add(e.source.id);
            });
            
            node.filter(d => connectedNodeIds.has(d.id))
                .attr('stroke', '#f39c12')
                .attr('stroke-width', 4);
            
            // 高亮当前节点
            node.filter(d => d.id === nodeId)
                .attr('stroke', '#e74c3c')
                .attr('stroke-width', 4);
        }
        
        // 鼠标悬停处理
        function handleMouseOver(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = '<strong>' + d.label + '</strong><br/>' + d.type;
            tooltip.style.opacity = 1;
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
        }
        
        function handleMouseOut() {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.opacity = 0;
        }
        
        // 控制函数
        function resetView() {
            svg.transition()
                .duration(750)
                .call(zoom.transform, d3.zoomIdentity);
            highlightRelatedNodes(null);
            document.getElementById('node-details').innerHTML = '<p>点击图谱中的节点查看详细信息...</p>';
        }
        
        let labelsVisible = true;
        function toggleLabels() {
            labelsVisible = !labelsVisible;
            labels.style('display', labelsVisible ? 'block' : 'none');
            linkLabels.style('display', labelsVisible ? 'block' : 'none');
        }
        
        function exportPNG() {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            // 设置白色背景
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
            
            // 将SVG转换为图片
            const serializer = new XMLSerializer();
            const source = serializer.serializeToString(svg.node());
            const img = new Image();
            const svgBlob = new Blob([source], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0);
                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.download = '评估师图谱.png';
                a.href = pngUrl;
                a.click();
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }
        
        function updateNodeSize(size) {
            node.attr('r', size);
            simulation.force('collision', d3.forceCollide().radius(parseInt(size) + 10));
            simulation.alpha(0.3).restart();
        }
        
        function updateForce(strength) {
            simulation.force('charge', d3.forceManyBody().strength(-strength));
            simulation.alpha(0.3).restart();
        }
        
        // 初始化类型统计显示
        function initTypeStats() {
            const nodeCounts = {};
            nodes.forEach(n => {
                nodeCounts[n.type] = (nodeCounts[n.type] || 0) + 1;
            });
            
            const edgeCounts = {};
            edges.forEach(e => {
                edgeCounts[e.type] = (edgeCounts[e.type] || 0) + 1;
            });
            
            let nodeList = '<h4>节点类型分布</h4>';
            for (const [type, count] of Object.entries(nodeCounts)) {
                nodeList += '<div>' + type + ': ' + count + '</div>';
            }
            
            let edgeList = '<h4>关系类型分布</h4>';
            for (const [type, count] of Object.entries(edgeCounts)) {
                edgeList += '<div>' + type + ': ' + count + '</div>';
            }
            
            document.getElementById('node-type-list').innerHTML = nodeList;
            document.getElementById('edge-type-list').innerHTML = edgeList;
        }
        
        // 初始化
        initTypeStats();
        
        // 更新鼠标移动时的工具提示
        svg.on('mousemove', function(event) {
            const tooltip = document.getElementById('tooltip');
            if (tooltip.style.opacity > 0) {
                tooltip.style.left = (event.pageX + 10) + 'px';
                tooltip.style.top = (event.pageY - 10) + 'px';
            }
        });
